<div class="mermaid">
{{- .Inner | safeHTML -}}
</div>

<script src="{{ "js/mermaid.min.js" | relURL }}"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'neutral',
    themeVariables: {
      background: 'transparent',
      primaryColor: '#e1f5fe',
      primaryTextColor: '#000',
      lineColor: '#01579b'
    }
  });
</script>
